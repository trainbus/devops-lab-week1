global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:

  - job_name: 'node'
    static_configs:
      - targets: ['127.0.0.1:9100']

  - job_name: 'platform-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:3000']

  - job_name: 'haproxy'
    metrics_path: /metrics
    static_configs:
      - targets: ['127.0.0.1:8404']
